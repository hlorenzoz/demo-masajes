ci:
  autofix_prs: true
  autoupdate_schedule: weekly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bunx prettier --write
        language: system
        types_or: [svelte, ts, css, json, markdown]
      - id: svelte-check
        name: svelte-check
        entry: bunx svelte-check --tsconfig ./tsconfig.json
        language: system
        pass_filenames: false
        files: \.(svelte|ts)$
